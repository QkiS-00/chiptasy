<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Кабінет</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cabinet.css">
</head>
<body>


    <header class="header">
        <div class="logo">
    <img src="img/logo.png" alt="Chiptasy" height="32">
</div>
        <nav>
            <a href="index.html">Головна</a>
            <a href="favorites.html">Обране</a>
        </nav>
        <div class="header-right">
            <span id="username-display" onclick="window.location.href='cabinet.html'" style="cursor:pointer"></span>
            <button onclick="logout()">Вийти</button>
        </div>
    </header>

    <div class="cabinet-container">

        <div class="sidebar">
            <button class="btn-settings" 
                    onclick="window.location.href='settings.html'">
                ⚙ Налаштування
            </button>
        </div>

        <div class="cabinet-main">

            <div class="profile-banner">
                <div class="profile-left">
                    <div class="profile-photo" id="profile-photo">ФОТО</div>
                    <div class="profile-info">
                        <h2 id="profile-name">Нікнейм</h2>
                        <p>годі сидіти треба робити</p>
                    </div>
                </div>
                <img src="img/knight-guitar.png" class="profile-char">
            </div>


            <h3 class="section-title">Статистика</h3>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-icon">💜</div>
                    <div>
                        <span id="stat-saves">0</span>
                        <p>Зберігань</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👁</div>
                    <div>
                        <span id="stat-plays">0</span>
                        <p>Прослуховувань</p>
                    </div>
                </div>
            </div>

            <h3 class="section-title">Ваше збереження</h3>
            <div id="saved-tracks" class="saved-list"></div>

        </div>
    </div>

    <footer class="footer">
        <div class="footer-left">
            <img src="img/logo.png" alt="Chiptasy" class="footer-logo">
            <p>Створюй своє</p>
        </div>
        <div class="footer-links">
            <div>
                <h4>Компанія</h4>
                <a href="404.html">Про нас</a>
                <a href="404.html">Мій обліковий запис</a>
                <a href="favorites.html">Обране</a>
            </div>
        </div>
        <div class="footer-right">
            <p>ALL RIGHTS RESERVED. 2026</p>
        </div>
        <img src="img/knight-sword.png" alt="" class="footer-knight">
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/cabinet.js"></script>
</body>
</html>
