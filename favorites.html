<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Обране</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>
<body>
    <header class="header">
        <div class="logo">🎵 Chiptasy</div>
        <nav>
            <a href="index.html">Головна</a>
            <a href="favorites.html">Обране</a>
        </nav>
        <div class="header-right">
            <span id="username-display"></span>
            <button onclick="logout()">Вийти</button>
        </div>
    </header>

    <section class="favorites-hero">
        <div>
            <h1>❤️ Моє обране</h1>
            <p>Тут зберігаються твої улюблені треки</p>
        </div>
    </section>

    <main class="main">
        <div id="favorites-list" class="track-list"></div>
    </main>


    <div class="player" id="player">
        <div class="player-info">
            <span id="player-title">Оберіть трек</span>
        </div>
        <div class="player-controls">
            <button onclick="prevTrack()">⏮</button>
            <button onclick="togglePlay()">▶</button>
            <button onclick="nextTrack()">⏭</button>
        </div>
        <audio id="audio"></audio>
        <div class="player-progress">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" max="100" oninput="setProgress()">
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/favorites.js"></script>
</body>
</html>
