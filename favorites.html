<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Обране</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>

    <!-- Шапка -->
    <header class="header">
       <div class="logo">
    <img src="img/logo.png" alt="Chiptasy" height="32">
</div>
        <nav>
            <a href="index.html">Головна</a>
            <a href="favorites.html">Обране</a>
        </nav>
        <div class="header-right">
            <span id="username-display"></span>
            <button onclick="logout()">Вийти</button>
        </div>
    </header>

    <main class="main">

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('liked')">❤️ Вподобані</button>
            <button class="tab" onclick="switchTab('playlists')">📂 Плейлисти</button>
        </div>

        <!-- Вподобані треки -->
        <div id="tab-liked">
            <div id="favorites-list" class="track-list"></div>
        </div>

        <!-- Плейлисти -->
        <div id="tab-playlists" style="display:none">

            <!-- Створити плейлист -->
            <div class="create-playlist">
                <input type="text" id="playlist-name" placeholder="Назва плейлиста...">
                <button onclick="createPlaylist()">+ Створити</button>
            </div>

            <!-- Список плейлистів -->
            <div id="playlists-list"></div>
        </div>

    </main>

    <!-- Плеєр -->
    <div class="player">
        <div class="player-info">
            <span id="player-title">Оберіть трек</span>
        </div>
        <div class="player-controls">
            <button onclick="prevTrack()">|◀</button>
            <button onclick="togglePlay()">▶</button>
            <button onclick="nextTrack()">▶|</button>
        </div>
        <audio id="audio"></audio>
        <div class="player-progress">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" max="100" oninput="setProgress()">
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/favorites.js"></script>
</body>
</html>
