<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Обране</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>


    <header class="header">
       <div class="logo">
    <img src="img/logo.png" alt="Chiptasy" height="32">
</div>
        <nav>
            <a href="index.html">Головна</a>
            <a href="favorites.html">Обране</a>
        </nav>
        <div class="header-right">
           <span id="username-display" onclick="window.location.href='cabinet.html'" style="cursor:pointer"></span>
            <button onclick="logout()">Вийти</button>
        </div>
    </header>

    <main class="main">

        <div class="tabs">
            <button class="tab active" onclick="switchTab('liked')">❤️ Вподобані</button>
            <button class="tab" onclick="switchTab('playlists')">📂 Плейлисти</button>
        </div>


        <div id="tab-liked">
            <div id="favorites-list" class="track-list"></div>
        </div>

        <div id="tab-playlists" style="display:none">

            <div class="create-playlist">
                <input type="text" id="playlist-name" placeholder="Назва плейлиста...">
                <button onclick="createPlaylist()">+ Створити</button>
            </div>

            <div id="playlists-list"></div>
        </div>

    </main>

    <div class="player">
        <div class="player-info">
            <span id="player-title">Оберіть трек</span>
        </div>
        <div class="player-controls">
            <button onclick="prevTrack()">|◀</button>
            <button onclick="togglePlay()">▶</button>
            <button onclick="nextTrack()">▶|</button>
        </div>
        <audio id="audio"></audio>
        <div class="player-progress">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" max="100" oninput="setProgress()">
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/favorites.js"></script>
    <!-- Футер -->
<footer class="footer">
    <div class="footer-left">
        <img src="img/logo.png" alt="Chiptasy" class="footer-logo">
        <p>Створюй своє</p>
    </div>
    <div class="footer-links">
        <div>
            <h4>Компанія</h4>
            <a href="404.html">Про нас</a>
            <a href="404.html">Мій обліковий запис</a>
            <a href="favorites.html">Обране</a>
        </div>
    </div>
    <div class="footer-right">
        <p>ALL RIGHTS RESERVED. 2026</p>
    </div>
    <img src="img/knight-sword.png" alt="" class="footer-knight">
</footer>
</body>
</html>
