<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — 404</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-404 {
            min-height: 100vh;
            background: url('img/404-bg.png') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
        }

        .page-404::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
        }

        .error-content {
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 16px;
            font-family: Arial, sans-serif;
        }

        .error-code span {
            color: #a855f7;
        }

        .error-text {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .error-subtext {
            font-size: 18px;
            color: #cccccc;
            margin-bottom: 40px;
        }

        .btn-home {
            display: inline-block;
            padding: 14px 32px;
            background-color: #a855f7;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-home:hover {
            background-color: #9333ea;
        }
    </style>
</head>
<body style="padding-bottom:0; margin:0;">

    <div class="page-404">
        <div class="error-content">
            <div class="error-code">4<span>0</span>4</div>
            <p class="error-text">вибач(</p>
            <p class="error-subtext">лицарю треба відпочити...</p>
            <a href="index.html" class="btn-home">На головну →</a>
        </div>
    </div>

    <!-- Футер -->
    <footer class="footer">
        <div class="footer-left">
            <img src="img/logo.png" alt="Chiptasy" class="footer-logo">
            <p>Створюй своє</p>
        </div>
        <div class="footer-links">
            <div>
                <h4>Компанія</h4>
                <a href="#">Про нас</a>
                <a href="#">Мій обліковий запис</a>
                <a href="favorites.html">Обране</a>
            </div>
        </div>
        <div class="footer-right">
            <p>ALL RIGHTS RESERVED. 2026</p>
        </div>
        <img src="img/knight-sword.png" alt="" class="footer-knight">
    </footer>

</body>
</html>
