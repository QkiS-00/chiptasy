<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Головна</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>

    <header class="header">
        <div class="logo">🎵 Chiptasy</div>
        <nav>
            <a href="index.html">Головна</a>
            <a href="favorites.html">Обране</a>
        </nav>
        <div class="header-right">
            <input type="text" id="searchInput" placeholder="Пошук треків..." oninput="search()">
            <span id="username-display"></span>
            <button onclick="logout()">Вийти</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>ТВІЙ БІТ<br>ТВОЯ ПРИГОДА</h1>
            <p>ЗАВАНТАЖУЙ, СЛУХАЙ, ПРОДАВАЙ</p>
            <div class="hero-buttons">
                <button class="btn-primary">Слухати біти</button>
                <button class="btn-secondary">Завантажити біт</button>
            </div>
        </div>
    </section>


    <main class="main">
        >
<h2>ТОП-5 місяця 🎵</h2>
        <div id="track-list" class="track-list"></div>
    </main>


    <div class="player" id="player">
        <div class="player-info">
            <span id="player-title">Оберіть трек</span>
        </div>
        <div class="player-controls">
    <button onclick="prevTrack()">|◀</button>
    <button onclick="togglePlay()">▶</button>
    <button onclick="nextTrack()">▶|</button>
    <button id="shuffle-btn" onclick="toggleShuffle()" title="Перемішати">⇄</button>
    <button id="repeat-btn" onclick="toggleRepeat()" title="Повторити">↩</button>
    🔊
    <input type="range" id="volume" min="0" max="100" value="100" oninput="setVolume()">
</div>
        <audio id="audio"></audio>
        <div class="player-progress">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" max="100" oninput="setProgress()">
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
