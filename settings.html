<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Налаштування</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cabinet.css">
</head>
<body>

    <!-- Шапка -->
    <header class="header">
        <div class="logo">
            <img src="img/logo.png" alt="Chiptasy" height="32">
        </div>
        <nav>
            <a href="index.html">Головна</a>
            <a href="favorites.html">Обране</a>
        </nav>
        <div class="header-right">
            <span id="username-display"></span>
            <button onclick="logout()">Вийти</button>
        </div>
    </header>

    <!-- Форма -->
    <div class="settings-wrapper">
        <div class="settings-form">
            <h2>Налаштування</h2>

            <div class="settings-section">
                <h4>Фото профілю</h4>
                <div class="photo-row">
                    <div class="photo-preview-small" id="photo-preview"></div>
                    <button class="btn-photo" 
                            onclick="document.getElementById('photo-input').click()">
                        📷 Додати фото
                    </button>
                    <input type="file" id="photo-input" accept="image/*" 
                           style="display:none" onchange="uploadPhoto(event)">
                </div>
            </div>

            <div class="settings-section">
                <h4>Персональна інформація</h4>
                <label>Повне ім'я</label>
                <input type="text" id="fullname" placeholder="Ваше ім'я">
                <label>Дата народження</label>
                <input type="date" id="birthdate">
                <label>Пошта Email</label>
                <input type="email" id="email" placeholder="example@gmail.com">
            </div>

            <div class="settings-section">
                <h4>Особисті дані</h4>
                <label>Пароль</label>
                <input type="password" id="current-password" 
                       placeholder="поточний пароль">
                <label>Новий пароль</label>
                <input type="password" id="new-password" 
                       placeholder="придумайте пароль">
                <label>Повторіть пароль</label>
                <input type="password" id="repeat-password" 
                       placeholder="повторіть новий пароль">
            </div>

            <p id="settings-msg" class="error-msg"></p>

            <div class="settings-buttons">
                <button class="btn-back" 
                        onclick="window.location.href='cabinet.html'">
                    Назад
                </button>
                <button class="btn-save" onclick="saveSettings()">
                    Оновити дані
                </button>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <footer class="footer">
        <div class="footer-left">
            <img src="img/logo.png" alt="Chiptasy" class="footer-logo">
            <p>Створюй своє</p>
        </div>
        <div class="footer-links">
            <div>
                <h4>Компанія</h4>
                <a href="#">Про нас</a>
                <a href="#">Мій обліковий запис</a>
                <a href="favorites.html">Обране</a>
            </div>
        </div>
        <div class="footer-right">
            <p>ALL RIGHTS RESERVED. 2026</p>
        </div>
        <img src="img/knight-sword.png" alt="" class="footer-knight">
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
