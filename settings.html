<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Налаштування</title>
    <link rel="stylesheet" href="css/cabinet.css">
</head>
<body>

    <div class="settings-container">

        <div class="settings-photo">
            <div class="photo-preview" id="photo-preview"></div>
            <button class="btn-photo" onclick="document.getElementById('photo-input').click()">📷 Додати фото</button>
            <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="uploadPhoto(event)">
        </div>

        <div class="settings-form">
            <h2>Налаштування</h2>

            <div class="settings-section">
                <h4>Фото профілю</h4>
                <div class="photo-row">
                    <div class="photo-preview-small" id="photo-preview-2"></div>
                    <button class="btn-photo" onclick="document.getElementById('photo-input').click()">📷 Додати фото</button>
                </div>
            </div>

            <div class="settings-section">
                <h4>Персональна інформація</h4>
                <label>Повне ім'я</label>
                <input type="text" id="fullname" placeholder="Альоша">
                <label>Дата народження</label>
                <input type="date" id="birthdate">
                <label>Пошта Email</label>
                <input type="email" id="email" placeholder="example@gmail.com">
            </div>

            <div class="settings-section">
                <h4>Особисті дані</h4>
                <label>Пароль</label>
                <input type="password" id="current-password" placeholder="поточний пароль">
                <label>Новий пароль</label>
                <input type="password" id="new-password" placeholder="придумайте пароль">
                <label>Повторіть пароль</label>
                <input type="password" id="repeat-password" placeholder="повторіть новий пароль">
            </div>

            <p id="settings-msg" class="error-msg"></p>

            <div class="settings-buttons">
                <button class="btn-back" onclick="window.location.href='cabinet.html'">Назад</button>
                <button class="btn-save" onclick="saveSettings()">Оновити дані</button>
            </div>

        </div>
    </div>

    <script src="js/settings.js"></script>
</body>
</html>
