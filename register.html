<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptasy — Реєстрація</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">

        <div class="auth-image">
            <img src="img/auth-bg.png" alt="Chiptasy">
        </div>

        <div class="auth-form">
            <h1>Створити акаунт</h1>
            <p>Вже маєте обліковий запис? <a href="login.html">Увійти</a></p>

            <input type="text" id="username" placeholder="Нік / ім'я / псевдонім">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <input type="password" id="confirmPassword" placeholder="Повторити пароль">

            <p id="error-msg" class="error-msg"></p>

            <button onclick="register()">Створити</button>
        </div>

    </div>

    <script src="js/auth.js"></script>
    <!-- Футер -->
<footer class="footer">
    <div class="footer-left">
        <img src="img/logo.png" alt="Chiptasy" class="footer-logo">
        <p>Створюй своє</p>
    </div>
    <div class="footer-links">
        <div>
            <h4>Компанія</h4>
            <a href="#">Про нас</a>
            <a href="#">Мій обліковий запис</a>
            <a href="favorites.html">Обране</a>
        </div>
    </div>
    <div class="footer-right">
        <p>ALL RIGHTS RESERVED. 2026</p>
    </div>
    <img src="img/knight-sword.png" alt="" class="footer-knight">
</footer>
</body>
</html>
